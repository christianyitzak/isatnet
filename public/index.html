<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/output.css">
    <title>ISATNET</title>
  </head>

  <body class="text-[#595959] font-[inter]">
    <nav class="mx-auto flex justify-between items-center py-5 px-5">
      <div>
        <img src="images/logo-isatnet.svg" alt="isatnet logo" class="h-7">
      </div>

      <div>
        <button class="md:hidden">
          <img src="images/icon-menu-line.svg" alt="menu icon">
        </button>
      </div>
    </nav>

    <section class="mx-auto grid grid-cols-1 px-5 my-10">
      <img src="images/hero.jpg" alt="a person use his phone" class="w-full">

      <div class="mt-5">
        <h1 class="text-3xl font-medium mb-5">
          Solusi Internet Terbaik
          <span class="block text-[#00C7A8] font-semibold">#denganISATNET</span>
        </h1>

        <p class="text-sm leading-relaxed mb-10">
          Nikmati koneksi internet cepat dan stabil tanpa hambatan untuk kebutuhan keluarga dan bisnis Anda. Jadilah bagian dari solusi digital terbaik sekarang!
        </p>
        
        <a href="#" class="text-sm text-white bg-[#00C7A8] py-3.5 px-8 inline-block rounded-full">Get Started</a>
      </div>
    </section>    
  </body>
</html>
