<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="src/output.css">
        <title>ISATNET</title>
    </head>

    <body class="font-sans">

        <!-- Navigation -->
        <nav class="mx-auto flex justify-between items-center p-4 text-[#595959] md:max-w-7xl">

            <!-- Left Navigation -->
            <div class="flex items-center gap-10">
                <img src="img/logo-isatnet.svg" alt="isatnet logo">

                <ul class="hidden md:flex gap-5">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">Product</a></li> 
                    <li><a href="#">Home</a></li>
                </ul>
            </div>
            
            <!-- Right Navigation -->
            <div class="hidden md:flex items-center gap-5">
                <a href="#">Contact Us</a>
                <a href="#" class="border-2 rounded-full border-[#00C7A8] text-[#00C7A8] py-2 px-5 w-fit">Get Started</a>

                <!-- Language Switcher -->
                <button class="flex items-center gap-3.5 border-l-2 border-[#59595968] pl-4">
                    EN <img src="img/icon-globe.svg" alt="globe" class="p-1 bg-[#CFF2EC] rounded-full">
                </button>
            </div>
            
            <!-- Hamburger Menu -->
            <div class="md:hidden">
                <button>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="16" viewBox="0 0 18 16" fill="none">
                        <path d="M0 0H18V2H0V0ZM0 7H18V9H0V7ZM0 14H18V16H0V14Z" fill="#595959"/>
                    </svg>
                </button>
            </div>

        </nav>

        <!-- Hero -->
        <section class="mx-auto grid grid-cols-1 items-center p-4 text-[#595959] md:grid-cols-2 md:max-w-7xl">
            
            <!-- Hero Text Content -->
            <div class="order-2 md:order-1">
                <h1 class="text-3xl mb-3.5 font-medium md:text-6xl md:mb-5">
                    Solusi Internet Terbaik
                    <span class="block text-[#00C7A8] font-semibold">#denganISATNET</span>
                </h1>

                <p class="text-sm max-w-80 mb-5 leading-relaxed md:text-base md:max-w-96 md:mb-10">
                    Nikmati koneksi internet cepat dan stabil tanpa hambatan 
                    untuk kebutuhan keluarga dan bisnis Anda. Jadilah bagian 
                    dari solusi digital terbaik sekarang!
                </p>

                <a href="#" class="py-2 px-3 md:px-5 text-white bg-[linear-gradient(274deg,_#00C7A8_0%,_#88E6B6_100%)] rounded-full flex w-fit items-center gap-3.5">
                    Get Started <img src="img/icon-arrow.svg" alt="arrow icon" class="p-1 bg-white rounded-full">
                </a>
            </div>

            <!-- Hero Image -->
             <img src="img/hero.jpg" alt="a man use his phone" class="w-full order-1 sm:mb-3.5 md:order-2">
        </section>

    </body>
</html>
